<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>משמעות — עלון פרשת השבוע</title>
  <meta name="description" content="עלון משמעות — פרשת השבוע בגובה העיניים, לכל אחד" />
  <meta property="og:title" content="משמעות" />
  <meta property="og:description" content="עלון פרשת השבוע" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Heebo:wght@300;400;500;700;800;900&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    // GitHub Pages SPA fallback decoder — restores the path that 404.html encoded
    (function () {
      var s = window.location.search;
      if (s && s.indexOf('?/') === 0) {
        var decoded = s
          .slice(2)
          .split('&')
          .map(function (kv) { return kv.replace(/~and~/g, '&'); })
          .join('?');
        window.history.replaceState(null, '', '/' + decoded + window.location.hash);
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
