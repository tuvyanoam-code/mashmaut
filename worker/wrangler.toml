name = "mashmaut-api"
main = "src/index.js"
compatibility_date = "2024-12-30"
account_id = "ea19fdb623516ff23c6cc375bea912bb"

# Cron runs every hour. The worker's scheduled handler then reads
# config.dispatchSchedule (day-of-week, hour, enabled, requireApproval) and
# decides whether to send the weekly bulletin. This lets the admin reconfigure
# the schedule at runtime without redeploying.
[triggers]
crons = ["0 * * * *"]

# KV namespaces — IDs are filled in by the setup script after `wrangler kv:namespace create`.
[[kv_namespaces]]
binding = "EMAILS"
id = "be1997254a314cd0bc359175cb933073"

[[kv_namespaces]]
binding = "EVENTS"
id = "f7a3af92250640d8ac96ee4a83847860"

# Public origin of the static site. Used in emails and CORS allowlist.
[vars]
SITE_URL = "https://alonmashmaut.org"
API_URL = "https://api.alonmashmaut.org"
SITE_NAME = "משמעות"
ADMIN_EMAIL = "alonmashmaut@gmail.com"
FROM_EMAIL = "alon@alonmashmaut.org"
FROM_NAME = "עלון משמעות"
GITHUB_REPO = "tuvyanoam-code/mashmaut"
GITHUB_BRANCH = "main"

[[routes]]
pattern = "api.alonmashmaut.org"
custom_domain = true
