<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A · פרגמנט — מוקאפ משמעות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Noto+Serif+Hebrew:wght@300;400;500;600&family=David+Libre:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2a2418;
    --ink-soft: #5b4f3c;
    --parchment: #f4ecd8;
    --parchment-deep: #ead9b6;
    --parchment-shadow: #d9c69b;
    --forest: #1f3a2e;
    --forest-soft: #355c47;
    --gold: #a07a2c;
    --gold-warm: #c9a04b;
    --pomegranate: #8a2a2a;
    --rule: #b89762;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Noto Serif Hebrew", "Frank Ruhl Libre", serif;
    background: var(--parchment);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 15% 8%, rgba(184,151,98,.18), transparent 55%),
      radial-gradient(ellipse at 85% 92%, rgba(31,58,46,.10), transparent 50%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.42  0 0 0 0 0.34  0 0 0 0 0.18  0 0 0 .055 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ─── ornamental rules ─── */
  .rule {
    display: flex; align-items: center; gap: 14px; justify-content: center;
    color: var(--gold); margin: 18px auto;
  }
  .rule::before, .rule::after {
    content: ""; flex: 1; max-width: 140px; height: 1px;
    background: linear-gradient(to var(--dir, left), transparent, var(--gold) 40%, var(--gold) 60%, transparent);
  }
  .rule .glyph {
    font-family: "Frank Ruhl Libre", serif; font-size: 18px; opacity: .85;
    letter-spacing: .2em;
  }

  /* ─── nav ─── */
  nav {
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(8px); background: rgba(244,236,216,.78);
    border-bottom: 1px solid rgba(160,122,44,.25);
    padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; }
  .nav-logo img { height: 36px; width: auto; filter: sepia(.2) saturate(1.1); }
  .nav-logo .name {
    font-family: "Frank Ruhl Libre", serif; font-weight: 500;
    font-size: 22px; color: var(--forest); letter-spacing: .04em;
  }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    font-family: "Frank Ruhl Libre", serif;
    color: var(--ink-soft); text-decoration: none; font-size: 16px;
    letter-spacing: .03em; transition: color .25s;
  }
  .nav-links a:hover { color: var(--gold); }

  /* ─── splash ─── */
  .splash {
    min-height: calc(100vh - 65px);
    display: grid; place-items: center;
    text-align: center; padding: 60px 24px;
    position: relative;
  }
  .splash::before {
    content: ""; position: absolute; inset: 40px;
    border: 1px solid rgba(160,122,44,.25);
    border-radius: 2px;
    pointer-events: none;
  }
  .splash::after {
    content: ""; position: absolute; inset: 50px;
    border: 1px solid rgba(160,122,44,.15);
    pointer-events: none;
  }
  .splash-inner { position: relative; max-width: 720px; }

  .splash-logo {
    width: 280px; height: auto; margin: 0 auto 28px;
    filter: sepia(.25) saturate(1.15) drop-shadow(0 4px 24px rgba(31,58,46,.15));
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) both;
  }

  .hero-quote {
    font-family: "Frank Ruhl Libre", serif;
    font-weight: 400; font-size: clamp(36px, 6.4vw, 68px);
    color: var(--forest); line-height: 1.15; letter-spacing: -.005em;
    margin: 8px 0 18px;
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) .15s both;
  }
  .hero-quote em {
    font-style: normal; color: var(--gold);
    border-bottom: 1px solid rgba(160,122,44,.4);
    padding-bottom: 4px;
  }

  .hero-tagline {
    font-family: "Noto Serif Hebrew", serif; font-weight: 300;
    font-size: clamp(16px, 1.8vw, 19px); color: var(--ink-soft);
    max-width: 520px; margin: 0 auto 36px; line-height: 1.7;
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) .3s both;
  }

  .scroll-cue {
    display: inline-flex; flex-direction: column; align-items: center; gap: 14px;
    text-decoration: none; color: var(--forest);
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) .5s both;
  }
  .scroll-cue .text {
    font-family: "Frank Ruhl Libre", serif; font-size: 14px;
    letter-spacing: .35em; text-transform: none;
    color: var(--gold);
  }
  .scroll-cue .arrow {
    width: 1px; height: 56px; background: var(--gold-warm);
    position: relative;
    animation: scrollPulse 2.4s ease-in-out infinite;
  }
  .scroll-cue .arrow::after {
    content: ""; position: absolute; bottom: 0; left: 50%;
    width: 10px; height: 10px; border-right: 1px solid var(--gold-warm);
    border-bottom: 1px solid var(--gold-warm);
    transform: translateX(-50%) rotate(45deg);
  }

  /* ─── cover (bulletin) ─── */
  .cover {
    padding: 90px 24px 120px;
    max-width: 920px; margin: 0 auto;
    position: relative;
  }
  .cover-eyebrow {
    text-align: center;
    font-family: "Frank Ruhl Libre", serif; font-size: 13px;
    letter-spacing: .5em; color: var(--gold);
    text-transform: none;
    margin-bottom: 28px;
  }

  .cover-card {
    background:
      linear-gradient(180deg, rgba(244,236,216,.6), rgba(234,217,182,.4)),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.95' numOctaves='2' seed='2'/><feColorMatrix values='0 0 0 0 0.50  0 0 0 0 0.40  0 0 0 0 0.20  0 0 0 .035 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    border: 1px solid rgba(160,122,44,.35);
    border-radius: 4px;
    padding: 56px 48px 48px;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 30px 60px -30px rgba(31,58,46,.18),
      0 8px 16px -8px rgba(31,58,46,.08);
  }
  .cover-card::before, .cover-card::after {
    content: ""; position: absolute; width: 36px; height: 36px;
    border: 1px solid var(--gold);
  }
  .cover-card::before {
    top: 14px; right: 14px;
    border-bottom: none; border-left: none;
  }
  .cover-card::after {
    bottom: 14px; left: 14px;
    border-top: none; border-right: none;
  }

  .cover-issue {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1px solid rgba(160,122,44,.3);
  }
  .issue-number {
    font-family: "Frank Ruhl Libre", serif; font-weight: 300;
    font-size: 56px; color: var(--gold); line-height: 1;
  }
  .issue-meta {
    text-align: left;
    font-family: "Frank Ruhl Libre", serif; color: var(--ink-soft);
  }
  .issue-meta .year { font-size: 14px; letter-spacing: .25em; color: var(--gold); margin-bottom: 6px; }
  .issue-meta .date { font-size: 16px; }

  .cover-eyebrow-2 {
    font-family: "Frank Ruhl Libre", serif; font-size: 14px;
    letter-spacing: .35em; color: var(--ink-soft);
    margin-bottom: 14px;
  }

  .parsha-name {
    font-family: "Frank Ruhl Libre", serif; font-weight: 700;
    font-size: clamp(56px, 9vw, 110px); color: var(--forest);
    line-height: 1; letter-spacing: -.015em;
    margin-bottom: 30px;
  }
  .parsha-name::before {
    content: "פרשת"; display: block;
    font-size: 18px; font-weight: 300; color: var(--gold);
    letter-spacing: .35em; margin-bottom: 10px;
  }

  .teaser {
    font-family: "Noto Serif Hebrew", serif; font-weight: 400;
    font-size: clamp(20px, 2.4vw, 26px); line-height: 1.55;
    color: var(--ink); max-width: 600px;
    margin-bottom: 40px;
    position: relative; padding-right: 22px;
  }
  .teaser::before {
    content: ""; position: absolute; right: 0; top: 8px;
    width: 3px; height: calc(100% - 16px);
    background: linear-gradient(to bottom, var(--gold), transparent);
  }

  .cta-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    font-family: "Frank Ruhl Libre", serif;
    padding: 14px 32px; border: 1px solid var(--forest);
    background: var(--forest); color: var(--parchment);
    font-size: 16px; letter-spacing: .12em;
    text-decoration: none; cursor: pointer;
    transition: all .35s cubic-bezier(.2,.7,.2,1);
    position: relative;
  }
  .btn:hover { background: var(--ink); transform: translateY(-1px); box-shadow: 0 8px 20px -8px rgba(31,58,46,.4); }
  .btn.outline {
    background: transparent; color: var(--forest);
  }
  .btn.outline:hover { background: var(--forest); color: var(--parchment); }

  /* ─── footer of the cover ─── */
  .cover-foot {
    text-align: center; margin-top: 60px;
    color: var(--ink-soft); font-family: "Frank Ruhl Libre", serif;
    font-size: 14px; letter-spacing: .25em;
  }

  /* ─── animations ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: .4; transform: scaleY(.7); transform-origin: top; }
    50%      { opacity: 1; transform: scaleY(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
  @media (max-width: 600px) {
    .cover-card { padding: 40px 24px 32px; }
    .splash::before, .splash::after { inset: 20px; }
    .cover-issue { flex-direction: column; gap: 12px; align-items: flex-start; }
    .issue-meta { text-align: right; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <img src="../public/logo.png" alt="משמעות">
    <span class="name">משמעות</span>
  </div>
  <div class="nav-links">
    <a href="#">ארכיון</a>
    <a href="#">חיפוש</a>
    <a href="#">הרשמה</a>
  </div>
</nav>

<section class="splash">
  <div class="splash-inner">
    <img class="splash-logo" src="../public/logo.png" alt="משמעות">

    <div class="rule" style="--dir: left;">
      <span class="glyph">✦</span>
    </div>

    <h1 class="hero-quote">
      כן, גם אתה<br>
      <em>יכול להבין.</em>
    </h1>

    <p class="hero-tagline">
      רעיונות לפרשת השבוע מתוך תורתו של<br>
      הרב יצחק גינזבורג שליט"א
    </p>

    <a href="#cover" class="scroll-cue">
      <span class="text">לעלון השבוע</span>
      <span class="arrow"></span>
    </a>
  </div>
</section>

<section class="cover" id="cover">
  <div class="cover-eyebrow">העלון של השבוע</div>

  <article class="cover-card">
    <div class="cover-issue">
      <div class="issue-number">№&nbsp;50</div>
      <div class="issue-meta">
        <div class="year">תשפ״ו</div>
        <div class="date">י׳ באייר</div>
      </div>
    </div>

    <h2 class="parsha-name">אֱמֹר</h2>

    <p class="teaser">
      להתקדש, לקדש, אבל לגמרי בטבעיות.
      למה אי אפשר לומר לך לקדש את השם?
    </p>

    <div class="cta-row">
      <a href="#" class="btn">קריאת העלון</a>
      <a href="#" class="btn outline">פתיחת ה־PDF</a>
    </div>
  </article>

  <div class="cover-foot">משמעות · תשפ״ו</div>
</section>

</body>
</html>
