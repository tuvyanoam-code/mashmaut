<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D · חצר ירושלמית — מוקאפ משמעות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Suez+One&family=Assistant:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2a221a;
    --ink-soft: #6e5d49;
    --ink-mute: #9c8975;

    --stone:        #efe4d0;   /* Jerusalem stone */
    --stone-light:  #f6eedd;
    --stone-deep:   #d9c8a8;
    --stone-shadow: #b89e75;

    --olive: #4f5f2a;
    --olive-deep: #36421a;
    --pomegranate: #8b1f2c;
    --pomegranate-bright: #b22a3a;
    --bronze: #a06a28;
    --bronze-light: #c89251;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Assistant", "Frank Ruhl Libre", sans-serif;
    background: var(--stone);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    /* stone texture */
    background-image:
      radial-gradient(ellipse 120% 50% at 0% 0%, rgba(184,158,117,.20), transparent 60%),
      radial-gradient(ellipse 110% 50% at 100% 100%, rgba(160,106,40,.10), transparent 55%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='3' seed='5'/><feColorMatrix values='0 0 0 0 0.45  0 0 0 0 0.32  0 0 0 0 0.18  0 0 0 .07 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ─── reusable tile pattern ─── */
  .tile-pattern {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><g fill='none' stroke='%23a06a28' stroke-width='1.1' opacity='.55'><path d='M40 4 L60 24 L40 44 L20 24 Z'/><path d='M40 36 L60 56 L40 76 L20 56 Z'/><path d='M0 24 L20 24 M60 24 L80 24 M0 56 L20 56 M60 56 L80 56'/><circle cx='40' cy='24' r='3' fill='%238b1f2c' stroke='none'/><circle cx='40' cy='56' r='3' fill='%238b1f2c' stroke='none'/></g></svg>");
    background-size: 80px 80px;
  }

  /* ─── nav ─── */
  nav {
    background: rgba(246,238,221,.85);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--olive);
    padding: 16px 36px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .nav-logo { display: flex; align-items: center; gap: 14px; }
  .nav-logo img { height: 38px; width: auto; }
  .nav-logo .name {
    font-family: "Frank Ruhl Libre", serif; font-weight: 700;
    font-size: 23px; color: var(--olive-deep); letter-spacing: .03em;
  }
  .nav-logo .sub {
    font-family: "Frank Ruhl Libre", serif; font-size: 11px;
    color: var(--bronze); letter-spacing: .35em; display: block;
    margin-top: -4px;
  }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    font-family: "Assistant", sans-serif; font-weight: 600;
    color: var(--olive-deep); text-decoration: none;
    font-size: 14px; letter-spacing: .12em;
    padding: 6px 12px; border-radius: 2px;
    transition: all .25s;
    position: relative;
  }
  .nav-links a::after {
    content: ""; position: absolute; left: 12px; right: 12px; bottom: 0;
    height: 2px; background: var(--pomegranate); transform: scaleX(0); transform-origin: right;
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .nav-links a:hover { color: var(--pomegranate); }
  .nav-links a:hover::after { transform: scaleX(1); transform-origin: left; }

  /* ─── splash ─── */
  .splash {
    min-height: calc(100vh - 70px);
    display: grid; place-items: center;
    text-align: center; padding: 70px 24px 80px;
    position: relative;
  }

  /* tile bands as decorative borders */
  .tile-band {
    position: absolute; left: 0; right: 0; height: 56px;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='112' height='56' viewBox='0 0 112 56'><g fill='none' stroke='%234f5f2a' stroke-width='1.2'><path d='M0 28 L28 0 L56 28 L28 56 Z'/><path d='M56 28 L84 0 L112 28 L84 56 Z'/><circle cx='28' cy='28' r='4' fill='%238b1f2c' stroke='none'/><circle cx='84' cy='28' r='4' fill='%23a06a28' stroke='none'/><line x1='0' y1='6' x2='112' y2='6' stroke='%23a06a28' stroke-width='.8' opacity='.6'/><line x1='0' y1='50' x2='112' y2='50' stroke='%23a06a28' stroke-width='.8' opacity='.6'/></g></svg>");
    background-size: 112px 56px;
    background-repeat: repeat-x;
    opacity: .5;
  }
  .tile-band.top { top: 0; }
  .tile-band.bot { bottom: 0; }

  .splash-inner { position: relative; max-width: 760px; }

  /* arched plaque behind hero */
  .plaque {
    position: relative;
    padding: 56px 40px 48px;
    background:
      linear-gradient(180deg, var(--stone-light), var(--stone));
    border: 2px solid var(--olive);
    border-radius: 200px 200px 12px 12px / 180px 180px 12px 12px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.7) inset,
      0 30px 60px -30px rgba(54,66,26,.28),
      0 12px 24px -16px rgba(139,31,44,.18);
  }
  .plaque::before {
    content: ""; position: absolute;
    inset: 8px;
    border: 1px solid var(--bronze);
    border-radius: 190px 190px 6px 6px / 170px 170px 6px 6px;
    pointer-events: none;
    opacity: .55;
  }

  .splash-logo {
    width: 240px; height: auto;
    margin: 0 auto 22px;
    filter: drop-shadow(0 6px 16px rgba(54,66,26,.18));
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) both;
  }

  .ornament-row {
    display: flex; align-items: center; gap: 14px; justify-content: center;
    margin-bottom: 18px;
    color: var(--bronze);
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) .1s both;
  }
  .ornament-row .line {
    flex: 1; max-width: 90px; height: 1px;
    background: linear-gradient(to var(--dir, left), transparent, var(--bronze));
  }
  .ornament-row .star {
    font-size: 12px; letter-spacing: .3em; color: var(--pomegranate);
  }

  .hero-quote {
    font-family: "Frank Ruhl Libre", serif; font-weight: 700;
    font-size: clamp(40px, 6.6vw, 72px);
    color: var(--olive-deep); line-height: 1.12; letter-spacing: -.012em;
    margin-bottom: 18px;
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) .2s both;
  }
  .hero-quote .accent {
    color: var(--pomegranate); position: relative;
  }
  .hero-quote .accent::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -4px;
    height: 2px; background: var(--bronze); border-radius: 2px;
  }

  .hero-tagline {
    font-family: "Frank Ruhl Libre", serif; font-weight: 400;
    font-size: clamp(15px, 1.7vw, 17px); color: var(--ink-soft);
    max-width: 460px; margin: 0 auto 8px; line-height: 1.7;
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) .3s both;
  }

  .scroll-cue {
    margin-top: 44px;
    display: inline-flex; flex-direction: column; align-items: center; gap: 12px;
    text-decoration: none; color: var(--olive-deep);
    animation: fadeUp 1.1s cubic-bezier(.2,.7,.2,1) .45s both;
  }
  .scroll-cue .text {
    font-family: "Assistant", sans-serif; font-weight: 600;
    font-size: 12px; letter-spacing: .45em;
    color: var(--pomegranate);
    padding: 6px 18px;
    border: 1px solid var(--pomegranate);
    border-radius: 2px;
    transition: all .3s;
  }
  .scroll-cue:hover .text { background: var(--pomegranate); color: var(--stone-light); }
  .scroll-cue .arrow {
    width: 1px; height: 36px; background: var(--bronze);
    animation: scrollPulse 2.2s ease-in-out infinite;
  }
  @keyframes scrollPulse {
    0%,100% { opacity: .5; transform: scaleY(.7); transform-origin: top; }
    50%     { opacity: 1; transform: scaleY(1); }
  }

  /* ─── cover ─── */
  .cover {
    padding: 70px 24px 110px;
    max-width: 980px; margin: 0 auto;
  }

  .cover-eyebrow {
    text-align: center; margin-bottom: 32px;
    font-family: "Assistant", sans-serif; font-weight: 700;
    font-size: 12px; letter-spacing: .55em;
    color: var(--pomegranate);
    display: inline-flex; align-items: center; gap: 14px;
    width: 100%; justify-content: center;
  }
  .cover-eyebrow::before, .cover-eyebrow::after {
    content: ""; width: 60px; height: 1px; background: var(--bronze);
  }

  .cover-card {
    position: relative;
    background: var(--stone-light);
    border: 2px solid var(--olive);
    border-radius: 6px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 20px 40px -20px rgba(54,66,26,.25),
      0 8px 16px -10px rgba(139,31,44,.18);
    overflow: hidden;
  }

  .cover-card .ribbon {
    position: absolute; top: 0; left: 0; right: 0;
    height: 28px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='28' viewBox='0 0 56 28'><g fill='none' stroke='%23ffffff' stroke-width='1.2' opacity='.7'><path d='M0 14 L14 0 L28 14 L42 0 L56 14' /></g><rect width='56' height='28' fill='%238b1f2c' opacity='.95'/><g fill='none' stroke='%23c89251' stroke-width='1' opacity='.9'><path d='M0 14 L14 0 L28 14 L42 0 L56 14' /></g></svg>");
    background-size: 56px 28px;
    background-repeat: repeat-x;
  }

  .cover-content { padding: 56px 44px 44px; position: relative; }

  .cover-issue-row {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 28px; padding-bottom: 22px;
    border-bottom: 1px dashed var(--bronze);
  }
  .issue-badge {
    display: inline-flex; align-items: baseline; gap: 8px;
    font-family: "Frank Ruhl Libre", serif;
    color: var(--olive-deep);
  }
  .issue-badge .small { font-size: 14px; color: var(--ink-soft); letter-spacing: .15em; }
  .issue-badge .num {
    font-family: "Suez One", "Frank Ruhl Libre", serif;
    font-size: 48px; color: var(--pomegranate);
    line-height: 1; letter-spacing: -.02em;
  }
  .issue-meta {
    font-family: "Assistant", sans-serif; font-weight: 500;
    font-size: 13px; color: var(--ink-soft); letter-spacing: .15em;
    text-align: left;
  }
  .issue-meta strong { color: var(--olive-deep); display: block; font-size: 16px; letter-spacing: .05em; }

  .parsha-eyebrow {
    font-family: "Assistant", sans-serif; font-weight: 600;
    color: var(--bronze); font-size: 13px; letter-spacing: .45em;
    margin-bottom: 10px;
  }

  .parsha-name {
    font-family: "Suez One", "Frank Ruhl Libre", serif;
    font-size: clamp(64px, 10vw, 124px); line-height: 1;
    color: var(--olive-deep); letter-spacing: -.02em;
    margin-bottom: 20px;
    text-shadow: 0 2px 0 rgba(255,255,255,.5);
  }

  .pomegranate-rule {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 28px;
  }
  .pomegranate-rule svg { width: 28px; height: 28px; color: var(--pomegranate); }
  .pomegranate-rule .line {
    flex: 1; height: 1px; background: linear-gradient(to left, transparent, var(--bronze) 30%);
  }

  .teaser {
    font-family: "Frank Ruhl Libre", serif; font-weight: 400;
    font-size: clamp(19px, 2.2vw, 24px); line-height: 1.55;
    color: var(--ink); max-width: 620px;
    margin-bottom: 40px;
  }

  .cta-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    font-family: "Assistant", sans-serif; font-weight: 600;
    padding: 13px 30px; border-radius: 2px;
    background: var(--pomegranate); color: var(--stone-light);
    font-size: 14px; letter-spacing: .15em;
    text-decoration: none; cursor: pointer; border: none;
    transition: all .35s cubic-bezier(.2,.7,.2,1);
    box-shadow: 0 4px 12px -4px rgba(139,31,44,.5);
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: ""; position: absolute; inset: 3px;
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 1px; pointer-events: none;
  }
  .btn:hover { background: var(--pomegranate-bright); transform: translateY(-2px); }
  .btn.outline {
    background: transparent; color: var(--olive-deep);
    border: 1.5px solid var(--olive);
    box-shadow: none;
  }
  .btn.outline::before { display: none; }
  .btn.outline:hover { background: var(--olive-deep); color: var(--stone-light); border-color: var(--olive-deep); }

  /* tile band footer */
  .cover-foot-band {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='112' height='32' viewBox='0 0 112 32'><g fill='none' stroke='%234f5f2a' stroke-width='1.1' opacity='.5'><path d='M0 16 L16 0 L32 16 L48 0 L64 16 L80 0 L96 16 L112 0' /><path d='M0 16 L16 32 L32 16 L48 32 L64 16 L80 32 L96 16 L112 32' /><circle cx='16' cy='16' r='2' fill='%238b1f2c' stroke='none'/><circle cx='48' cy='16' r='2' fill='%23a06a28' stroke='none'/><circle cx='80' cy='16' r='2' fill='%238b1f2c' stroke='none'/></g></svg>");
    background-size: 112px 32px; background-repeat: repeat-x;
    height: 32px;
    border-top: 1px solid var(--olive);
  }

  /* ─── footer ─── */
  .foot {
    text-align: center; padding: 32px 24px 50px;
    font-family: "Frank Ruhl Libre", serif; font-size: 14px;
    color: var(--ink-soft); letter-spacing: .2em;
  }
  .foot .star { color: var(--pomegranate); margin: 0 10px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
  @media (max-width: 700px) {
    .cover-content { padding: 36px 24px 30px; }
    .nav-links { gap: 14px; }
    .plaque { padding: 36px 22px 32px; border-radius: 140px 140px 8px 8px; }
    .cover-issue-row { flex-direction: column; gap: 16px; align-items: flex-start; }
    .issue-meta { text-align: right; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <img src="../public/logo.png" alt="משמעות">
    <div>
      <span class="name">משמעות</span>
      <span class="sub">פרשת השבוע</span>
    </div>
  </div>
  <div class="nav-links">
    <a href="#">ארכיון</a>
    <a href="#">חיפוש</a>
    <a href="#">הרשמה</a>
  </div>
</nav>

<section class="splash">
  <div class="tile-band top"></div>
  <div class="tile-band bot"></div>

  <div class="splash-inner">
    <div class="plaque">
      <img class="splash-logo" src="../public/logo.png" alt="משמעות">

      <div class="ornament-row">
        <span class="line" style="--dir: left;"></span>
        <span class="star">✦</span>
        <span class="line" style="--dir: right;"></span>
      </div>

      <h1 class="hero-quote">
        כן, גם אתה<br>
        יכול <span class="accent">להבין</span>.
      </h1>

      <p class="hero-tagline">
        רעיונות לפרשת השבוע מתוך תורתו של<br>
        הרב יצחק גינזבורג שליט"א
      </p>
    </div>

    <a href="#cover" class="scroll-cue">
      <span class="text">לעלון השבוע</span>
      <span class="arrow"></span>
    </a>
  </div>
</section>

<section class="cover" id="cover">
  <div style="text-align: center;">
    <span class="cover-eyebrow">העלון של השבוע</span>
  </div>

  <article class="cover-card">
    <div class="ribbon"></div>
    <div class="cover-content">
      <div class="cover-issue-row">
        <div class="issue-badge">
          <span class="small">גליון</span>
          <span class="num">50</span>
        </div>
        <div class="issue-meta">
          <strong>תשפ״ו</strong>
          י׳ באייר
        </div>
      </div>

      <div class="parsha-eyebrow">פרשת</div>
      <h2 class="parsha-name">אֱמֹר</h2>

      <div class="pomegranate-rule">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2c1 1 1.5 2 1 3.5C16 6 19 9 19 13c0 4-3 8-7 8s-7-4-7-8c0-4 3-7 6-7.5C10.5 4 11 3 12 2z" opacity=".9"/>
          <circle cx="9.5" cy="13" r="1" fill="#fff" opacity=".6"/>
          <circle cx="13" cy="11.5" r="1" fill="#fff" opacity=".6"/>
          <circle cx="14" cy="15" r="1" fill="#fff" opacity=".6"/>
          <circle cx="10.5" cy="16.5" r="1" fill="#fff" opacity=".6"/>
        </svg>
        <span class="line"></span>
      </div>

      <p class="teaser">
        להתקדש, לקדש, אבל לגמרי בטבעיות.
        למה אי אפשר לומר לך לקדש את השם?
      </p>

      <div class="cta-row">
        <a href="#" class="btn">קריאת העלון</a>
        <a href="#" class="btn outline">פתיחת ה־PDF</a>
      </div>
    </div>
    <div class="cover-foot-band"></div>
  </article>
</section>

<footer class="foot">משמעות <span class="star">✦</span> תשפ״ו</footer>

</body>
</html>
